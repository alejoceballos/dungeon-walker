# - - STARTUP - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

logging:
  level:
    root: info
    org:
      apache:
        kafka: warn
    momomomo:
      dungeonwalker:
        wsserver:
          startup: debug
          transport: debug
          core: debug
          domain: debug

# - - TRANSPORT - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

spring:
  kafka:
    consumer:
      enable-auto-commit: false
      bootstrap-servers: kafka:29092
      concurrency: 3
      poll-timeout: 3000
    producer:
      bootstrap-servers: kafka:29092
      acks: 1
      retries: 3

kafka:
  topic:
    game-engine:
      inbound: "game-engine-producer-topic"
      outbound: "game-engine-consumer-topic"

# - - CORE - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

heartbeat:
  delay: 10
  time-unit: SECONDS

pekko:
  remote:
    artery:
      canonical:
        hostname: "127.0.0.1"
        port: "2551"
  cluster:
    seed-nodes:
      - "pekko://WsServerClusterSystem@127.0.0.1:2551"
