syntax = "proto3";

package contract.engine;

import "engine/coordinates.proto";

option java_package = "momomomo.dungeonwalker.contract.engine";
option java_outer_classname = "DungeonStateProto";

message DungeonState {
  int32 width = 1;
  int32 height = 2;
  map<string, Coordinates> coordinates = 3;
}