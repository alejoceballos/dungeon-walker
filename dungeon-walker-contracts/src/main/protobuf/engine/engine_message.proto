syntax = "proto3";

package contract.engine;

import "engine/engine_heartbeat.proto";
import "engine/dungeon_cell_state.proto";
import "engine/dungeon_state.proto";

option java_package = "momomomo.dungeonwalker.contract.engine";
option java_outer_classname = "EngineMessageProto";

message EngineMessage {
  string target = 1;

  oneof data {
    EngineHeartbeat heartbeat = 2;
    DungeonCellState dungeon_cell_state = 3;
    DungeonState dungeon_state = 4;
    string message = 5;
    string error = 6;
  }
}
