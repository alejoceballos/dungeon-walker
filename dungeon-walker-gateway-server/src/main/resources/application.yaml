spring:
  application:
    name: dungeon-walker-gateway-server
  profiles:
    active: ${APP_PROFILE:dev}
  config:
    import: "${CONFIG_SERVER_URL:optional:configserver:http://localhost:8083/}"
  cloud:
    gateway:
      server:
        webflux: # 1. Cloud Gateway WebFlux Server
          discovery: # 2. Connect to the gateway server
            locator: # 3. locate the gateway routes of other services
              enabled: false # 4. Use true to forward the traffic from external clients, false will enforce configuring a RouteLocator
              lower-case-service-id: true # 5. Converted service ID to lowercase

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true
  endpoint:
    gateway:
      access: unrestricted # Enable gateway-related endpoints inside the actuator
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true # Enable the environment info endpoint.
  metrics:
    tags:
      application: ${spring.application.name}
