logging:
  level:
    root: info
    org:
      apache:
        kafka: warn
      springframework:
        kafka:
          listener: warn
    momomomo:
      dungeonwalker:
        engine:
          startup: debug
          transport: debug
          core: debug
          domain: debug

test:
  kafka:
    producer:
      value-serializer: momomomo.dungeonwalker.contract.serializer.client.ClientRequestSerializer
    consumer:
      group-id: test
      value-deserializer: momomomo.dungeonwalker.contract.serializer.engine.EngineMessageDeserializer
      enable-auto-commit: true

spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false

  # - - TRANSPORT - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

  kafka:
    consumer:
      enable-auto-commit: false
      bootstrap-servers: localhost:9092
      concurrency: 3
      poll-timeout: 3000
    producer:
      bootstrap-servers: localhost:9092
      acks: 1
      retries: 3

kafka:
  topic:
    game-engine:
      inbound: "game-engine-consumer-topic"
      outbound: "game-engine-producer-topic"

# - - CORE  - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

pekko:
  persistence:
    r2dbc:
      dialect: "postgres"
      connection-factory:
        driver: "postgres"
        host: "127.0.0.1"
        port: "5432"
        database: "postgres"
        user: "postgres"
        password: "postgres"
  remote:
    artery:
      canonical:
        hostname: "127.0.0.1"
        port: "2552"
  cluster:
    seed-nodes:
      - "pekko://EngineClusterSystem@${pekko.remote.artery.canonical.hostname}:${pekko.remote.artery.canonical.port}"

dungeonwalker:
  engine:
    schedule:
      display-dungeon-state:
        enabled: ${DISPLAY_DUNGEON_STATE:false}
