pekko:
  persistence:
    r2dbc:
      dialect: "postgres"
      connection-factory:
        driver: "postgres"
        host: "${POSTGRES_HOST:127.0.0.1}"
        port: "${POSTGRES_PORT:5432}"
        database: "${POSTGRES_DB:postgres}"
        user: "${POSTGRES_USER:postgres}"
        password: "${POSTGRES_PASSWORD:postgres}"
  remote:
    artery:
      canonical:
        hostname: "127.0.0.1"
        port: "2552"
  cluster:
    seed-nodes:
      - "pekko://EngineClusterSystem@${pekko.remote.artery.canonical.hostname}:${pekko.remote.artery.canonical.port}"
