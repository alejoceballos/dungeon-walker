services:

  # - - - - KEYCLOAK - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

  keycloak-auth-server:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: keycloak-auth-server
    command: "start-dev"
    ports:
      - "8087:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
