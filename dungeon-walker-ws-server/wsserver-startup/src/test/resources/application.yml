logging:
  level:
    root: info
    org:
      apache:
        kafka: warn
      springframework:
        kafka:
          listener: warn
    momomomo:
      dungeonwalker:
        wsserver:
          startup: debug
          transport: debug
          core: debug
          domain: debug
test:
  kafka:
    consumer:
      group-id: test
      value-deserializer: momomomo.dungeonwalker.contract.serializer.client.ClientRequestDeserializer
      enable-auto-commit: false
    producer:
      value-serializer: momomomo.dungeonwalker.contract.serializer.engine.EngineMessageSerializer

spring:
  cloud:
    config:
      enabled: false
    discovery:
      enabled: false

  # - - TRANSPORT - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: "http://localhost:8087/realms/dungeon-walker-realm/protocol/openid-connect/certs"
          issuer-uri: "http://localhost:8087/realms/dungeon-walker-realm"

  kafka:
    consumer:
      enable-auto-commit: false
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      concurrency: 3
      poll-timeout: 3000
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      acks: 1
      retries: 3
      key-serializer: org.apache.kafka.common.serialization.StringSerializer

kafka:
  topic:
    game-engine:
      inbound: "game-engine-producer-topic"
      outbound: "game-engine-consumer-topic"

# - - CORE  - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - - -

pekko:
  remote:
    artery:
      canonical:
        hostname: "127.0.0.1"
        port: "2551"
  cluster:
    seed-nodes:
      - "pekko://WsServerClusterSystem@${pekko.remote.artery.canonical.hostname}:${pekko.remote.artery.canonical.port}"

heartbeat:
  delay: 10
  time-unit: SECONDS
